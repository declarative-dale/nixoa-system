# ==============================================================================
# XO Server Configuration Settings - Complete /etc/xo-server/config.toml Template
# ==============================================================================
# This file is a 1:1 representation of what gets generated for /etc/xo-server/config.toml
# Whatever you configure here will be exactly what Xen Orchestra uses
#
# After making changes:
#   1. Commit: ./commit-config "Updated XO settings"
#   2. Rebuild: cd /etc/nixos/nixoa-ce && sudo nixos-rebuild switch --flake .#nixoa

# ==============================================================================
# HTTP/HTTPS CONFIGURATION
# ==============================================================================

[http]
# Redirect all HTTP traffic to HTTPS (only applies when TLS is enabled)
redirectToHttps = true

# HTTP Listen Configuration
# Note: The [[http.listen]] array is conditionally generated based on tls.enable
# - Always includes HTTP port
# - HTTPS port only added when tls.enable = true

# HTTP Port (always enabled)
[http.listen.http]
port = 80

# HTTPS Port (only when tls.enable = true below)
[http.listen.https]
port = 443

# Web UI Mount Points
# These paths are where XO serves the web interface from
[http.mounts]
"/" = "/var/lib/xo/xen-orchestra/packages/xo-web/dist"      # Main UI (v5)
"/v6" = "/var/lib/xo/xen-orchestra/@xen-orchestra/web/dist" # New UI (v6)

# ==============================================================================
# TLS/SSL CONFIGURATION
# ==============================================================================

[tls]
enable = true           # Enable HTTPS
redirectToHttps = true  # Redirect HTTP → HTTPS
autoGenerate = true     # Auto-generate/renew self-signed certs

# Certificate paths
dir = "/etc/ssl/xo"
cert = "/etc/ssl/xo/certificate.pem"
key = "/etc/ssl/xo/key.pem"

# ==============================================================================
# REDIS CONFIGURATION
# ==============================================================================

[redis]
# Unix socket for Redis connection (faster than TCP)
socket = "/run/redis-xo/redis.sock"

# ==============================================================================
# AUTHENTICATION CONFIGURATION
# ==============================================================================

[authentication]
# How long authentication tokens remain valid
# Examples: "30 days", "1 week", "24 hours", "12 hours"
defaultTokenValidity = "30 days"

# ==============================================================================
# LOGGING CONFIGURATION
# ==============================================================================

[logs]
# Log verbosity level
# Options: "trace" (most verbose), "debug", "info", "warn", "error" (least verbose)
level = "info"

# ==============================================================================
# DATA STORAGE PATHS
# ==============================================================================

[dataStore]
# Primary data directory for XO (backups metadata, job logs, etc.)
path = "/var/lib/xo/data"

[tempDir]
# Temporary directory for XO operations
path = "/var/lib/xo/tmp"

# ==============================================================================
# REMOTE STORAGE OPTIONS
# ==============================================================================

[remoteOptions]
# Use sudo for mount operations (required for NFS/CIFS)
useSudo = true

# Base directory for remote storage mounts
mountsDir = "/var/lib/xo/mounts"

# ==============================================================================
# ADVANCED CONFIGURATION (Optional)
# ==============================================================================
# Additional XO server options can be added here following the official
# Xen Orchestra documentation: https://xen-orchestra.com/docs/configuration.html
#
# Examples:
#
# [authentication.ldap]
# uri = "ldap://ldap.example.com"
# bind.dn = "cn=xo,ou=users,dc=example,dc=com"
# bind.password = "secret"
#
# [mail]
# from = "xo@example.com"
# transport = "smtp://smtp.example.com:587"
